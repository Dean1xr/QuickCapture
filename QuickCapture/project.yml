name: QuickCapture
options:
  bundleIdPrefix: com.dean
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  QuickCapture:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: QuickCapture
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dean.quickcapture
      INFOPLIST_FILE: QuickCapture/Info.plist
      CODE_SIGN_ENTITLEMENTS: QuickCapture/QuickCapture.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: QuickCaptureWidget
        embed: true

  QuickCaptureWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: QuickCaptureWidget
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dean.quickcapture.widget
      INFOPLIST_FILE: QuickCaptureWidget/Info.plist
      CODE_SIGN_ENTITLEMENTS: QuickCaptureWidget/QuickCaptureWidget.entitlements
